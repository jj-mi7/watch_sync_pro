openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: fitness
    description: Fitness and sync data endpoints
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to OIDC logout.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
        '401':
          description: Token did not contain usable claims.
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Logout mobile session
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logged out.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutMobileSessionSuccess'
  /fitness/sync:
    post:
      tags: [fitness]
      operationId: syncFitnessData
      summary: Sync fitness data from watch
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FitnessSyncRequest'
      responses:
        '200':
          description: Synced successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FitnessSyncResponse'
  /fitness/logs:
    get:
      tags: [fitness]
      operationId: getFitnessLogs
      summary: Get historical fitness logs
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 30
      responses:
        '200':
          description: Fitness logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FitnessLogsResponse'
  /fitness/goal:
    post:
      tags: [fitness]
      operationId: setDailyGoal
      summary: Set daily fitness goal
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DailyGoalRequest'
      responses:
        '200':
          description: Goal set.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyGoalResponse'
    get:
      tags: [fitness]
      operationId: getDailyGoal
      summary: Get daily fitness goal
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Goal.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyGoalResponse'
components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      schema:
        type: string
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AuthUser:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          nullable: true
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        profileImageUrl:
          type: string
          nullable: true
      required:
        - id
        - email
        - firstName
        - lastName
        - profileImageUrl
    AuthUserEnvelope:
      type: object
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
      required:
        - user
    MobileTokenExchangeRequest:
      type: object
      properties:
        code:
          type: string
        code_verifier:
          type: string
        redirect_uri:
          type: string
        state:
          type: string
        nonce:
          type: string
          nullable: true
      required:
        - code
        - code_verifier
        - redirect_uri
        - state
    MobileTokenExchangeSuccess:
      type: object
      properties:
        token:
          type: string
      required:
        - token
    LogoutMobileSessionSuccess:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success
    FitnessSyncRequest:
      type: object
      properties:
        steps:
          type: integer
        calories:
          type: number
        distanceKm:
          type: number
        heartRate:
          type: integer
          nullable: true
        date:
          type: string
          format: date
        locationLat:
          type: number
          nullable: true
        locationLon:
          type: number
          nullable: true
      required:
        - steps
        - calories
        - distanceKm
        - date
    FitnessSyncResponse:
      type: object
      properties:
        success:
          type: boolean
        id:
          type: string
      required:
        - success
        - id
    FitnessLog:
      type: object
      properties:
        id:
          type: string
        date:
          type: string
        steps:
          type: integer
        calories:
          type: number
        distanceKm:
          type: number
        heartRate:
          type: integer
          nullable: true
        locationLat:
          type: number
          nullable: true
        locationLon:
          type: number
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - date
        - steps
        - calories
        - distanceKm
        - createdAt
    FitnessLogsResponse:
      type: object
      properties:
        logs:
          type: array
          items:
            $ref: '#/components/schemas/FitnessLog'
      required:
        - logs
    DailyGoalRequest:
      type: object
      properties:
        steps:
          type: integer
        calories:
          type: number
        distanceKm:
          type: number
      required:
        - steps
        - calories
        - distanceKm
    DailyGoalResponse:
      type: object
      properties:
        steps:
          type: integer
        calories:
          type: number
        distanceKm:
          type: number
      required:
        - steps
        - calories
        - distanceKm
